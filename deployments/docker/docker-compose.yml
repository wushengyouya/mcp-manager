x-app-base: &app-base
  restart: unless-stopped
  build:
    context: ../..
    dockerfile: deployments/docker/Dockerfile
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment: &app-env
    MCP_JWT_SECRET: ${MCP_JWT_SECRET:-change-me}
    MCP_DATABASE_DRIVER: ${MCP_DATABASE_DRIVER:-postgres}
    MCP_DATABASE_DSN: ${MCP_DATABASE_DSN:-postgres://postgres:${MCP_POSTGRES_PASSWORD:-postgres}@postgres:5432/${MCP_POSTGRES_DB:-mcp_manager}?sslmode=disable}
    MCP_REDIS_ENABLED: ${MCP_REDIS_ENABLED:-true}
    MCP_REDIS_ADDR: ${MCP_REDIS_ADDR:-redis:6379}
    MCP_RPC_AUTH_TOKEN: ${MCP_RPC_AUTH_TOKEN:-dual-role-dev-token}
    MCP_RPC_DIAL_TIMEOUT: ${MCP_RPC_DIAL_TIMEOUT:-3s}
    MCP_RPC_REQUEST_TIMEOUT: ${MCP_RPC_REQUEST_TIMEOUT:-15s}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MCP_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${MCP_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${MCP_POSTGRES_DB:-mcp_manager}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${MCP_POSTGRES_USER:-postgres} -d ${MCP_POSTGRES_DB:-mcp_manager}",
        ]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mcp-executor:
    <<: *app-base
    profiles: ["dual-role"]
    expose:
      - "8081"
      - "18081"
    environment:
      <<: *app-env
      MCP_APP_ROLE: executor
      MCP_SERVER_PORT: 8081
      MCP_HEALTH_CHECK_ENABLED: true
      MCP_RPC_ENABLED: true
      MCP_RPC_LISTEN_ADDR: 0.0.0.0:18081
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8081/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  mcp-control-plane:
    <<: *app-base
    profiles: ["dual-role"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-executor:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      <<: *app-env
      MCP_APP_ROLE: control-plane
      MCP_SERVER_PORT: 8080
      MCP_HEALTH_CHECK_ENABLED: false
      MCP_RPC_ENABLED: true
      MCP_RPC_EXECUTOR_TARGET: http://mcp-executor:18081
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  mcp-manager-all:
    <<: *app-base
    profiles: ["all"]
    ports:
      - "8080:8080"
    environment:
      <<: *app-env
      MCP_APP_ROLE: all
      MCP_SERVER_PORT: 8080
      MCP_HEALTH_CHECK_ENABLED: true
      MCP_RPC_ENABLED: false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres-data:
  redis-data:
