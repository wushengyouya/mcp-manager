version: "3.9"
services:
  mcp-manager:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MCP_JWT_SECRET: change-me
    volumes:
      - ../../data:/app/data
