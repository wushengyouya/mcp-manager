server:
  mode: release
jwt:
  secret: ""
database:
  # 容器/生产部署默认使用 PostgreSQL，环境变量仍可覆盖该配置
  driver: postgres
  dsn: postgres://postgres:postgres@postgres:5432/mcp_manager?sslmode=disable
  max_open_conns: 10
  max_idle_conns: 5
redis:
  enabled: true
  addr: redis:6379
app:
  role: all
runtime:
  snapshot_enabled: true
  snapshot_ttl: 30s
rpc:
  enabled: false
  listen_addr: 0.0.0.0:18081
  executor_target: http://mcp-executor:18081
  auth_token: dual-role-dev-token
  dial_timeout: 3s
  request_timeout: 15s
execution:
  executor_concurrency: 0
  service_rate_limit: 0
  user_rate_limit: 0
  rate_limit_window: 1m
  async_invoke_enabled: false
  async_task_queue_size: 64
  async_task_workers: 2
  default_task_timeout: 30s
audit:
  async_enabled: false
  queue_size: 256
alert:
  async_enabled: false
  queue_size: 64
history:
  async_enabled: false
  queue_size: 256
