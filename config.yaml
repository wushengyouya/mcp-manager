server:
  host: "0.0.0.0"
  port: 8080
  mode: "release"
  read_timeout: 30s
  write_timeout: 30s
  shutdown_timeout: 15s

database:
  # 支持 sqlite | postgres，当前默认切为 PostgreSQL；若需回退可显式改回 sqlite
  driver: "postgres"
  dsn: "postgres://postgres:postgres@127.0.0.1:5432/mcp_manager?sslmode=disable"
  max_open_conns: 1
  max_idle_conns: 1
  conn_max_lifetime: 1h

jwt:
  issuer: "mcp-manager"
  secret: ""
  access_ttl: 2h
  refresh_ttl: 168h

redis:
  enabled: true
  addr: "0.0.0.0:6379"
  password: ""
  db: 0
  key_prefix: "mcp-manager:"
  dial_timeout: 3s
  read_timeout: 2s
  write_timeout: 2s
  operation_timeout: 2s

rpc:
  # all 模式默认关闭；control-plane / executor 灰度时请显式启用并分别填写目标或监听地址
  enabled: false
  listen_addr: "127.0.0.1:18081"
  executor_target: "http://127.0.0.1:18081"
  auth_token: "dev-only-rpc-token"
  dial_timeout: 3s
  request_timeout: 10s

execution:
  # 0 表示关闭对应治理；默认保持兼容，按需显式开启 V1.4A 能力
  executor_concurrency: 0
  service_rate_limit: 0
  user_rate_limit: 0
  rate_limit_window: 1m
  async_invoke_enabled: false
  async_task_queue_size: 64
  async_task_workers: 2
  default_task_timeout: 30s

health_check:
  enabled: true
  interval: 30s
  timeout: 10s
  failure_threshold: 3

audit:
  retention_days: 90
  cleanup_interval: 24h
  async_enabled: false
  queue_size: 256

alert:
  enabled: false
  from: ""
  to: []
  smtp_host: ""
  smtp_port: 587
  smtp_username: ""
  smtp_password: ""
  subject_prefix: "[MCP-MANAGER]"
  silence_window: 30m
  async_enabled: false
  queue_size: 64

log:
  level: "info"
  format: "console"
  output: "stdout"
  max_size: 50
  max_backups: 5
  max_age: 30
  compress: false

app:
  name: "mcp-manager"
  version: "0.1.0"
  role: "all"
  init_admin_username: "root"
  init_admin_password: "admin123456"
  init_admin_email: "root@example.com"

runtime:
  status_source: "runtime_first"
  startup_reconcile: true
  snapshot_enabled: true
  snapshot_ttl: 30s
  idle_timeout: 0s

history:
  max_body_bytes: 8192
  compression: "none"
  async_enabled: false
  queue_size: 256
