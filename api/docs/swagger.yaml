        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.Body'
      summary: 刷新令牌
      tags:
      - auth
  /history:
    get:
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页大小
        in: query
        name: page_size
        type: integer
      - description: 服务ID
        in: query
        name: service_id
        type: string
      - description: 工具名
        in: query
        name: tool_name
        type: string
      - description: 状态
        in: query
        name: status
        type: string
      - description: 开始时间 RFC3339
        in: query
        name: start_at
        type: string
      - description: 结束时间 RFC3339
        in: query
        name: end_at
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 查询调用历史列表
      tags:
      - history
  /history/{id}:
    get:
      parameters:
      - description: 历史ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.Body'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 查询调用历史详情
      tags:
      - history
  /services:
