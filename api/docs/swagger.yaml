basePath: /api/v1
definitions:
  dto.ChangePasswordRequest:
    properties:
      new_password:
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  dto.CreateUserRequest:
    properties:
      email:
        type: string
      password:
        type: string
      role:
        enum:
        - admin
        - operator
        - readonly
        type: string
      username:
        type: string
    required:
    - email
    - password
    - role
    - username
    type: object
  dto.InvokeToolRequest:
    properties:
      arguments:
        additionalProperties: {}
        type: object
    required:
    - arguments
    type: object
  dto.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.LogoutRequest:
    properties:
      refresh_token:
        type: string
    type: object
  dto.RefreshTokenRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.UpdateUserRequest:
    properties:
      email:
        type: string
      is_active:
        type: boolean
      role:
        enum:
        - admin
        - operator
        - readonly
        type: string
    type: object
  dto.UpsertServiceRequest:
    properties:
      args:
        items:
          type: string
        type: array
      bearer_token:
        type: string
      command:
        type: string
      compat_mode:
        enum:
        - "off"
        - allow_legacy_sse
        type: string
      custom_headers:
        additionalProperties:
          type: string
        type: object
      description:
        type: string
      env:
        additionalProperties:
          type: string
        type: object
      listen_enabled:
        type: boolean
      name:
        type: string
      session_mode:
        enum:
        - auto
        - required
        - disabled
        type: string
      tags:
        items:
          type: string
        type: array
      timeout:
        type: integer
      transport_type:
        enum:
        - stdio
        - streamable_http
        - sse
        type: string
      url:
        type: string
    required:
    - name
    - transport_type
    type: object
  response.Body:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
      timestamp:
        type: integer
    type: object
info:
  contact: {}
  description: MCP 服务管理平台 API
  title: MCP 服务管理平台
  version: 0.1.0
paths:
  /audit-logs:
    get:
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页大小
        in: query
        name: page_size
        type: integer
      - description: 用户ID
        in: query
        name: user_id
        type: string
      - description: 操作类型
        in: query
        name: action
        type: string
      - description: 资源类型
        in: query
        name: resource_type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Body'
      security:
      - BearerAuth: []
      summary: 查询审计日志
      tags:
      - audit
  /audit-logs/export:
    get:
      parameters:
      - description: 操作类型
        in: query
        name: action
        type: string
      produces:
      - text/csv
      responses:
        "200":
          description: csv content
          schema:
            type: string
      security:
      - BearerAuth: []
      summary: 导出审计日志 CSV
      tags:
      - audit
  /auth/login:
    post:
      consumes:
